<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <meta name="description" content="마크다운으로 쓴 글을 모아두는 블로그입니다.">
  <script>
    (function () {
      var saved = localStorage.getItem("blog-theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-title">My Blog</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="다크 모드로 전환">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main>
    <div class="page-intro">
      <h1>My Blog</h1>
      <p>마크다운으로 쓴 글을 모아두는 공간입니다.</p>
    </div>
    <ul id="post-list" class="post-list">
      <li class="state-message">글 목록을 불러오는 중...</li>
    </ul>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> My Blog</p>
  </footer>

  <script src="js/markdown.js"></script>
  <script src="js/app.js"></script>
  <script src="js/list.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
